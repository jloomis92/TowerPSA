<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Profile · TowerPSA</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <a href="tickets.html" class="brand">TowerPSA</a>
      <nav class="site-nav">
        <a href="tickets.html" class="button primary">Dashboard</a>
        <a href="companies.html" class="button primary">Companies</a>
        <div class="manage-menu" hidden>
          <button type="button" id="manage-button" class="button primary" aria-haspopup="true" aria-expanded="false">Admin</button>
          <div id="manage-dropdown" class="dropdown-menu" hidden>
            <a href="users.html" class="dropdown-item">Users</a>
            <a href="sla-rules.html" class="dropdown-item">SLA Rules</a>
          </div>
        </div>
        <div class="profile-menu" hidden>
          <button type="button" id="profile-button" class="button profile-button" aria-haspopup="true" aria-expanded="false">
            <span class="profile-icon" id="profile-initials" aria-hidden="true">?</span>
          </button>
          <div id="profile-dropdown" class="dropdown-menu" hidden>
            <div class="dropdown-user-name" id="profile-fullname"></div>
            <div class="dropdown-divider" aria-hidden="true"></div>
            <button type="button" id="view-profile-button" class="dropdown-item">View Profile</button>
            <div class="dropdown-divider" aria-hidden="true"></div>
            <button type="button" id="logout-button" class="dropdown-item">Logout</button>
          </div>
        </div>
      </nav>
    </header>

    <main>
      <section class="hero-copy">
        <span class="eyebrow">User Profile</span>
        <a href="users.html" class="button secondary">Back to Users</a>
      </section>

      <section class="page-content" id="user-detail-shell" hidden>
        <div class="profile-card">
          <div class="profile-header">
            <div class="profile-avatar">
              <span class="avatar-initials" id="user-avatar-initials">?</span>
            </div>
            <div class="profile-header-info">
              <h2 id="user-name"></h2>
              <p class="profile-role" id="user-role-display"></p>
            </div>
          </div>

          <div class="profile-section">
            <h3>Account Details</h3>
            <div class="profile-fields">
              <div class="profile-field">
                <label>Email Address</label>
                <p id="user-email"></p>
              </div>
              <div class="profile-field">
                <label>Role</label>
                <p id="user-role"></p>
              </div>
              <div class="profile-field">
                <label>MFA Enabled</label>
                <p id="user-mfa-enabled"></p>
              </div>
              <div class="profile-field">
                <label>Created</label>
                <p id="user-created-at"></p>
              </div>
            </div>
          </div>
        </div>
      </section>

      <div id="user-load-error" class="form-error" hidden></div>
    </main>
  </div>

  <script src="user-detail.js"></script>
</body>
</html>
